<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<script src="assets/theme.js?v=3"></script>
<script src="assets/track.js?v=3"></script>
<script src="assets/analytics.js?v=6"></script>
<title>Thank you for your order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=15">
</head>
<body>
  <header class="topbar"><span class="brand" style="margin:0 auto"><img class="logo" src="assets/logo2.webp" alt="">Tai&nbsp;Motion</span></header>
  <div id="stephdr"></div>

  <main class="thanks">
    <div class="tick">🎉</div>
    <h1 class="q">Thank you for your order!</h1>
    <p class="sub">You can access your plan right away:</p>
    <div class="cta-bar" style="position:static;background:none">
      <div class="cta-inner"><button class="btn" id="access">Access my plan</button></div>
    </div>

    <div class="summary-card" style="text-align:left">
      <div id="orderList"></div>
      <div class="order-row tot"><span>Total today</span><span id="total">$0.00</span></div>
    </div>

    <p class="fineprint" id="emailNote"></p>
  </main>

  <script src="assets/api.js?v=5"></script>
  <script src="assets/flow.js?v=2"></script>
  <script>
    const s = FLOW.get();
    // Provisioning is handled server-side by the Stripe webhook (only after real payment).
    // Here we just show the summary and hand the member into the app via a magic link that
    // is gated on their paid checkout token (login-link verifies the token + active sub).
    document.getElementById("stephdr").innerHTML = FLOW.stepHeader("plan");
    const order = (s.order || []);
    document.getElementById("orderList").innerHTML = order.length
      ? order.map(o => `<div class="order-row"><span>${o.label}${o.recurring?" (recurring)":""}</span><span>${FLOW.money(o.amount)}${o.unit?"/"+o.unit:""}</span></div>`).join("")
      : '<div class="order-row"><span>Your plan</span><span>—</span></div>';
    document.getElementById("total").textContent = FLOW.money(FLOW.total());
    document.getElementById("emailNote").innerHTML =
      `We'll email your plan link to <b>${s.email || "your address"}</b>. If it doesn't arrive, use the button above or contact support.`;
    s.status = "purchased"; FLOW.save(s);
    const accessBtn = document.getElementById("access");
    accessBtn.onclick = async () => {
      accessBtn.textContent = "Setting up…"; accessBtn.disabled = true;
      try {
        // login-link requires proof of the paid checkout; the webhook may still be finalizing,
        // so retry briefly until the subscription reads as active.
        for (let i = 0; i < 8; i++) {
          const r = await API.loginLink({ subscriptionId: s.subscriptionId, checkoutToken: s.checkoutToken });
          if (r && r.action_link) { location.replace(r.action_link); return; }
          await new Promise(res => setTimeout(res, 1500));
        }
      } catch (e) { /* fall through */ }
      location.href = (window.TM_URL ? TM_URL("https://app.taimotion.com/") : "https://app.taimotion.com/"); // fallback: app email sign-in
    };
  </script>
  <script src="assets/testbar.js?v=1"></script>
</body>
</html>
