<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<script src="assets/theme.js?v=1"></script>
<title>Thank you for your order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=13">
</head>
<body>
  <header class="topbar"><span class="brand" style="margin:0 auto"><img class="logo" src="assets/logo2.webp" alt="">Tai&nbsp;Motion</span></header>
  <div id="stephdr"></div>

  <main class="thanks">
    <div class="tick">🎉</div>
    <h1 class="q">Thank you for your order!</h1>
    <p class="sub">You can access your plan right away:</p>
    <div class="cta-bar" style="position:static;background:none">
      <div class="cta-inner"><button class="btn" id="access">Access my plan</button></div>
    </div>

    <div class="summary-card" style="text-align:left">
      <div id="orderList"></div>
      <div class="order-row tot"><span>Total today</span><span id="total">$0.00</span></div>
    </div>

    <p class="fineprint" id="emailNote"></p>
  </main>

  <script src="assets/api.js"></script>
  <script src="assets/flow.js?v=2"></script>
  <script>
    const s = FLOW.get();
    // FAKE PAID provisioning: create the account + active subscription (no real Stripe).
    // Run once per session; the login link itself is fetched FRESH at click time (below).
    let provisionP = Promise.resolve();
    if (window.API && s.email && !s._provisioned) {
      provisionP = API.completeOrder({ quiz_session_id: s.id, email: s.email, name: s.name, selected_plan: s.selected_plan, order: s.order || [] })
        .then(r => { if (r && r.ok) { s._provisioned = true; FLOW.save(s); } });
    }
    document.getElementById("stephdr").innerHTML = FLOW.stepHeader("plan");
    const order = (s.order || []);
    document.getElementById("orderList").innerHTML = order.length
      ? order.map(o => `<div class="order-row"><span>${o.label}${o.recurring?" (recurring)":""}</span><span>${FLOW.money(o.amount)}${o.unit?"/"+o.unit:""}</span></div>`).join("")
      : '<div class="order-row"><span>Your plan</span><span>—</span></div>';
    document.getElementById("total").textContent = FLOW.money(FLOW.total());
    document.getElementById("emailNote").innerHTML =
      `We'll email your plan link to <b>${s.email || "your address"}</b>. If it doesn't arrive, save the link from this page or contact support.`;
    // mark complete + persist for the app gate
    s.status = "purchased"; s.has_access = true; FLOW.save(s);
    // TODO: confirmation handled server-side by Stripe webhook + Resend email
    const accessBtn = document.getElementById("access");
    accessBtn.onclick = async () => {
      accessBtn.textContent = "Setting up…"; accessBtn.disabled = true;
      try {
        await provisionP;                         // make sure the account exists
        const r = await API.loginLink(s.email);   // FRESH single-use magic link
        if (r && r.action_link) { location.replace(r.action_link); return; }
      } catch (e) { /* fall through */ }
      location.href = (window.TM_URL ? TM_URL("https://app.taimotion.com/") : "https://app.taimotion.com/"); // fallback
    };
  </script>
  <script src="assets/testbar.js?v=1"></script>
</body>
</html>
