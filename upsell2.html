<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<script src="assets/theme.js?v=3"></script>
<title>Improve more areas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=15">
<script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <header class="topbar"><span class="brand" style="margin:0 auto"><img class="logo" src="assets/logo2.webp" alt="">Tai&nbsp;Motion</span></header>
  <div id="stephdr"></div>

  <main>
    <div class="offer-head">Your answers showed areas <span class="hl-green">worth supporting</span></div>
    <h2 class="q" style="font-size:19px;text-align:left;max-width:var(--maxw);margin:0 auto 6px;padding:0 20px">What would you like to improve?</h2>

    <div id="guides"></div>

    <div class="cta-bar" style="position:static;background:none;margin-top:8px">
      <div class="cta-inner"><button class="btn" id="add">Claim now</button></div>
    </div>
    <button class="decline" id="skip">Continue without guides</button>
    <p class="fineprint">Selected add-ons are charged once to your account. Refundable per our refund policy.</p>
  </main>

  <script src="assets/api.js?v=5"></script>
  <script src="assets/stripe.js?v=2"></script>
  <script src="assets/flow.js?v=2"></script>
  <script src="assets/upsell.js?v=1"></script>
  <script>
    const GUIDES = [
      { id:"sleep", icon:"🛏️", gt:"Better Sleep", gd:"A Chair Tai Chi wind-down for restful nights", price:18.99 },
      { id:"eating", icon:"🍎", gt:"Eating Without Guilt", gd:"A calm, kind relationship with food", price:18.99 },
      { id:"aging", icon:"🌿", gt:"Aging Gracefully", gd:"7 pillars for a strong, calm, joyful later life", price:18.99 },
    ];
    const BUNDLE = { id:"all_guides", icon:"🧩", gt:"All 3 guides", gd:"Better Sleep, Eating Without Guilt & Aging Gracefully", old:56.97, price:38.99, off:"32% OFF", best:true };
    let selected = "all_guides";

    function render() {
      const box = document.getElementById("guides");
      const rowG = g => `<div class="guide ${selected===g.id?"sel":""}" data-id="${g.id}">
        <span class="ic">${g.icon}</span>
        <span class="gtext"><span class="gt">${g.gt}</span><span class="gd">${g.gd}</span></span>
        <span class="gprice">${g.old?`<span class="old">$${g.old}</span>`:""}$${g.price.toFixed(2)}${g.off?`<span class="tag-off">${g.off}</span>`:""}</span>
        ${g.best?'<span class="tag-rec">BEST VALUE</span>':""}</div>`;
      box.innerHTML = GUIDES.map(rowG).join("") + rowG(BUNDLE);
      box.querySelectorAll(".guide").forEach(el => el.onclick = () => { selected = el.dataset.id; render(); });
    }
    render();
    document.getElementById("stephdr").innerHTML = FLOW.stepHeader("offer");

    document.getElementById("add").onclick = (e) => {
      const all = [...GUIDES, BUNDLE]; const g = all.find(x => x.id === selected);
      // every option is one-time: bundle -> "all_guides", individual -> "guide_<id>"
      const upsellId = g.id === "all_guides" ? "all_guides" : "guide_" + g.id;
      UPSELL.accept(upsellId, { id: upsellId, label: g.gt, amount: g.price, recurring: false }, "thankyou.html", e.currentTarget);
    };
    document.getElementById("skip").onclick = () => { location.href = "thankyou.html"; };
  </script>
  <script src="assets/testbar.js?v=1"></script>
</body>
</html>
