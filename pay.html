<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<script src="assets/theme.js?v=3"></script>
<title>Chair Tai Chi — Secure checkout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=15">
<!-- Stripe.js must load live from Stripe's domain (no SRI — Stripe self-updates it). -->
<script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <header class="topbar"><span class="brand" style="margin:0 auto"><img class="logo" src="assets/logo2.webp" alt="">Tai&nbsp;Motion</span></header>
  <div id="stephdr"></div>

  <main>
    <div class="test-banner">🔒 Secure checkout — your card is processed by Stripe. Cancel anytime.</div>

    <h1 class="q">Secure checkout</h1>

    <div class="pay-card" id="payArea">
      <div class="order-row"><span id="planName">Plan</span><span id="planPrice">$0.00</span></div>
      <div class="order-row tot"><span>Total today</span><span id="total">$0.00</span></div>

      <p class="sub" style="margin:10px 0 4px">Billing email: <b id="emailShow"></b></p>
      <div id="payment-element" style="margin-top:10px"></div>
      <p class="fineprint" id="payMsg" style="color:#c0392b;min-height:1.2em"></p>
    </div>

    <div class="cta-bar" style="position:static;background:none">
      <div class="cta-inner"><button class="btn" id="pay" disabled>Pay &amp; continue</button></div>
    </div>
    <p class="fineprint" id="renew"></p>
  </main>

  <script src="assets/api.js?v=5"></script>
  <script src="assets/stripe.js?v=2"></script>
  <script src="assets/flow.js?v=2"></script>
  <script>
    const PLANS = { "1w":{name:"1-week plan",intro:5.19,renew:21.99,weeks:1},
      "4w":{name:"4-week plan",intro:9.99,renew:49.95,weeks:4},
      "12w":{name:"12-week plan",intro:19.99,renew:84.95,weeks:12} };
    const s = FLOW.get();
    const planId = s.selected_plan || "4w";
    const plan = PLANS[planId] || PLANS["4w"];
    const payBtn = document.getElementById("pay");
    const msg = document.getElementById("payMsg");
    document.getElementById("stephdr").innerHTML = FLOW.stepHeader("setup");
    document.getElementById("planName").textContent = plan.name + " (introductory)";
    document.getElementById("planPrice").textContent = FLOW.money(plan.intro);
    document.getElementById("total").textContent = FLOW.money(plan.intro);
    document.getElementById("emailShow").textContent = s.email || "(missing — please restart)";
    document.getElementById("renew").textContent =
      `Introductory ${plan.name} at ${FLOW.money(plan.intro)} today. Renews at ${FLOW.money(plan.renew)} every ${plan.weeks} week(s) unless cancelled. Cancel anytime in your account.`;

    let stripe, elements;
    // Optional promo via URL param, e.g. /pay?promo=TMTEST50 — no visible field.
    const promoCode = new URLSearchParams(location.search).get("promo") || localStorage.getItem("ctc_promo") || "";
    async function initSub(code) {
      payBtn.disabled = true; msg.textContent = "";
      document.getElementById("payment-element").innerHTML = "";
      if (!s.email || !s.id) { msg.textContent = "Missing your details — please restart the quiz."; return; }
      try {
        await API.submitQuiz(s);                       // ensure the quiz row carries the email server-side
        const r = await API.createSubscription({ plan_id: planId, quiz_session_id: s.id, promo_code: code || undefined });
        if (r && r.error === "already subscribed") {
          msg.textContent = "You already have an active plan. Redirecting to the app…";
          setTimeout(() => location.href = "https://app.taimotion.com/", 1500); return;
        }
        if (r && r.error === "invalid promo code") { return initSub(""); }   // bad ?promo -> normal pricing
        if (!r || !r.clientSecret) { msg.textContent = "Could not start checkout. Please refresh and retry."; return; }
        s.subscriptionId = r.subscriptionId; s.checkoutToken = r.checkoutToken; FLOW.save(s);
        if (typeof r.amount === "number") document.getElementById("total").textContent = FLOW.money(r.amount / 100);
        stripe = window.stripeClient();
        elements = stripe.elements({ clientSecret: r.clientSecret, appearance: { theme: "flat" } });
        elements.create("payment").mount("#payment-element");
        payBtn.disabled = false;
      } catch (e) { msg.textContent = "Could not start checkout. Please refresh and retry."; }
    }
    initSub(promoCode);

    payBtn.onclick = async () => {
      if (!stripe || !elements) return;
      payBtn.disabled = true; msg.textContent = "";
      const { error } = await stripe.confirmPayment({ elements, redirect: "if_required", confirmParams: { return_url: location.origin + "/thankyou.html" } });
      if (error) { msg.textContent = error.message || "Payment failed. Please check your card and retry."; payBtn.disabled = false; return; }
      const s2 = FLOW.get(); s2.paid = true; s2.status = "paid";
      s2.order = [{ id:"base_plan", label: plan.name, amount: plan.intro, recurring:true }];
      FLOW.save(s2);
      location.href = "upsell1.html";           // webhook provisions access during the upsell steps
    };
  </script>
  <script src="assets/testbar.js?v=1"></script>
</body>
</html>
