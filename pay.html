<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<script src="assets/theme.js?v=3"></script>
<script src="assets/track.js?v=3"></script>
<script src="assets/analytics.js?v=3"></script>
<title>Chair Tai Chi — Secure checkout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=15">
<!-- Stripe.js must load live from Stripe's domain (no SRI — Stripe self-updates it). -->
<script src="https://js.stripe.com/v3/"></script>
<style>
  .pay-loader{display:flex;flex-direction:column;align-items:center;gap:12px;justify-content:center;padding:34px 0;color:var(--muted,#6b7280);font-size:1rem;text-align:center}
  .pay-loader .spin{width:30px;height:30px;border:3px solid rgba(0,0,0,.14);border-top-color:var(--accent,#3aa76a);border-radius:50%;animation:payspin .8s linear infinite}
  @keyframes payspin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <header class="topbar"><span class="brand" style="margin:0 auto"><img class="logo" src="assets/logo2.webp" alt="">Tai&nbsp;Motion</span></header>
  <div id="stephdr"></div>

  <main>
    <div class="test-banner">🔒 Secure checkout — your card is processed by Stripe. Cancel anytime.</div>

    <h1 class="q">Secure checkout</h1>

    <div class="pay-card" id="payArea">
      <div class="order-row"><span id="planName">Plan</span><span id="planPrice">$0.00</span></div>
      <div class="order-row tot"><span>Total today</span><span id="total">$0.00</span></div>

      <p class="sub" style="margin:10px 0 4px">Billing email: <b id="emailShow"></b></p>
      <div id="payLoader" class="pay-loader"><span class="spin"></span><span>Preparing your secure card form…</span></div>
      <div id="payment-element" style="margin-top:10px"></div>
      <p class="fineprint" id="payMsg" style="color:#c0392b;min-height:1.2em"></p>
    </div>

    <div class="cta-bar" style="position:static;background:none">
      <div class="cta-inner"><button class="btn" id="pay" disabled>Pay &amp; continue</button></div>
    </div>
    <p class="fineprint" id="renew" hidden></p>
  </main>

  <script src="assets/api.js?v=5"></script>
  <script src="assets/stripe.js?v=2"></script>
  <script src="assets/flow.js?v=2"></script>
  <script>
    const PLANS = { "1w":{name:"1-week plan",intro:5.19,renew:21.99,weeks:1},
      "4w":{name:"4-week plan",intro:9.99,renew:49.95,weeks:4},
      "12w":{name:"12-week plan",intro:19.99,renew:84.95,weeks:12} };
    const s = FLOW.get();
    const planId = s.selected_plan || "4w";
    const plan = PLANS[planId] || PLANS["4w"];
    const payBtn = document.getElementById("pay");
    const msg = document.getElementById("payMsg");
    document.getElementById("stephdr").innerHTML = FLOW.stepHeader("setup");
    document.getElementById("planName").textContent = plan.name + " (introductory)";
    document.getElementById("planPrice").textContent = FLOW.money(plan.intro);
    document.getElementById("total").textContent = FLOW.money(plan.intro);
    document.getElementById("emailShow").textContent = s.email || "(missing — please restart)";
    // Renewal fine print intentionally hidden on this step (terms already shown on the checkout step).

    const payLoader = document.getElementById("payLoader");
    let stripe, elements;
    // Optional promo via URL param, e.g. /pay?promo=TMTEST50 — no visible field.
    const promoCode = new URLSearchParams(location.search).get("promo") || localStorage.getItem("ctc_promo") || "";
    async function initSub(code) {
      payBtn.disabled = true; msg.textContent = "";
      document.getElementById("payment-element").innerHTML = "";
      payLoader.style.display = "flex";               // show spinner while the sub is created + card form mounts
      window._payT0 = Date.now(); try { if (window.TM) TM.track("pay_view", { plan: planId }); } catch (e) {}
      if (!s.email || !s.id) { payLoader.style.display = "none"; msg.textContent = "Missing your details — please restart the quiz."; return; }
      try {
        await API.submitQuiz(s);                       // ensure the quiz row carries the email server-side
        let fb = {}; try { fb = JSON.parse(localStorage.getItem("ctc_fbc")) || {}; } catch (e) {}   // Meta ad-click id (captured site-wide by track.js)
        const r = await API.createSubscription({ plan_id: planId, quiz_session_id: s.id, promo_code: code || undefined, fbclid: fb.fbclid, fbclid_t: fb.fbclid_t });
        if (r && r.error === "already subscribed") {
          msg.textContent = "You already have an active plan. Redirecting to the app…";
          setTimeout(() => location.href = "https://app.taimotion.com/", 1500); return;   // keep loader (navigating)
        }
        if (r && r.error === "invalid promo code") { return initSub(""); }   // bad ?promo -> normal pricing
        if (r && r.activated) {                       // first invoice needed no card charge -> sub already active
          s.subscriptionId = r.subscriptionId; s.checkoutToken = r.checkoutToken;
          s.paid = true; s.status = "paid";
          s.order = [{ id:"base_plan", label: plan.name, amount: plan.intro, recurring:true }];
          FLOW.save(s);
          try { if (window.TM) TM.track("pay_succeeded", { plan: planId, mode: "activated_no_charge" }); } catch (e) {}
          location.href = "upsell1.html"; return;     // keep loader (navigating); webhook provisions access
        }
        if (!r || !r.clientSecret) { payLoader.style.display = "none"; try { if (window.TM) TM.track("pay_form_error", { reason: "no_client_secret" }); } catch (e) {} msg.textContent = "Could not start checkout. Please refresh and retry."; return; }
        s.subscriptionId = r.subscriptionId; s.checkoutToken = r.checkoutToken; FLOW.save(s);
        if (typeof r.amount === "number") document.getElementById("total").textContent = FLOW.money(r.amount / 100);
        stripe = window.stripeClient();
        elements = stripe.elements({ clientSecret: r.clientSecret, appearance: { theme: "flat" } });
        const paymentEl = elements.create("payment");
        paymentEl.on("ready", () => { payLoader.style.display = "none"; payBtn.disabled = false; try { if (window.TM) TM.track("pay_form_loaded", { ms: Date.now() - (window._payT0 || Date.now()) }); } catch (e) {} });  // hide spinner only when the card fields are actually rendered
        paymentEl.mount("#payment-element");
      } catch (e) { payLoader.style.display = "none"; try { if (window.TM) TM.track("pay_form_error", { reason: "exception" }); } catch (er) {} msg.textContent = "Could not start checkout. Please refresh and retry."; }
    }
    initSub(promoCode);

    payBtn.onclick = async () => {
      if (!stripe || !elements) return;
      payBtn.disabled = true; msg.textContent = "";
      try { if (window.TM) TM.track("pay_submitted", { plan: planId }); } catch (e) {}
      const { error } = await stripe.confirmPayment({ elements, redirect: "if_required", confirmParams: { return_url: location.origin + "/thankyou.html" } });
      if (error) { try { if (window.TM) TM.track("pay_failed", { message: (error.message || "").slice(0, 120), code: error.code || null, decline: error.decline_code || null }); } catch (e) {} msg.textContent = error.message || "Payment failed. Please check your card and retry."; payBtn.disabled = false; return; }
      try { if (window.TM) TM.track("pay_succeeded", { plan: planId }); } catch (e) {}
      const s2 = FLOW.get(); s2.paid = true; s2.status = "paid";
      s2.order = [{ id:"base_plan", label: plan.name, amount: plan.intro, recurring:true }];
      FLOW.save(s2);
      location.href = "upsell1.html";           // webhook provisions access during the upsell steps
    };
  </script>
  <script src="assets/testbar.js?v=1"></script>
</body>
</html>
